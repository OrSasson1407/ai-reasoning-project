name: EBD Meta-Cognition Benchmarks

on:
  schedule:
    - cron: '0 0 * * 0' # Run every Sunday at midnight
  workflow_dispatch: # Allow manual trigger

jobs:
  evaluate-calibration:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    
    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: "3.11"
        cache: "pip"
        
    - name: Install Dependencies
      run: pip install -r requirements.txt
      
    - name: Generate EBD Post-Consolidation Report
      run: |
        python scripts/run_benchmarks.py > ebd_report.txt
        
    - name: Archive EBD Report
      uses: actions/upload-artifact@v4
      with:
        name: ebd-calibration-report
        path: ebd_report.txt
