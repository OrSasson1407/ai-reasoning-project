name: AI Reasoning Core CI

on:
  push:
    branches: [ "main", "dev" ]
  pull_request:
    branches: [ "main", "dev" ]

jobs:
  architectural-validation:
    runs-on: ubuntu-latest
    services:
      mongodb:
        image: mongo:latest
        ports:
          - 27017:27017
      postgres:
        image: postgres:15
        env:
          POSTGRES_USER: user
          POSTGRES_PASSWORD: password
          POSTGRES_DB: aireasoning
        ports:
          - 5432:5432
          
    steps:
    - uses: actions/checkout@v4
    
    - name: Set up Python 3.11
      uses: actions/setup-python@v5
      with:
        python-version: "3.11"
        cache: "pip"
        
    - name: Install Dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt
        pip install black flake8 mypy pytest-cov
        
    - name: Enforce Code Style (Black)
      run: black --check ai_reasoning/
      
    - name: Strict Architectural Tests (Pytest)
      env:
        MONGO_URI: mongodb://localhost:27017/aireasoning
        POSTGRES_URI: postgresql://user:password@localhost:5432/aireasoning
        AI_REASONING_DEBUG: True
      run: |
        # Pytest will enforce DI, CI, and CV rules defined in tests/
        pytest --cov=ai_reasoning --cov-report=term-missing ai_reasoning/tests/
