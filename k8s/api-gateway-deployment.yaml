apiVersion: apps/v1
kind: Deployment
metadata:
  name: api-gateway
  namespace: ai-reasoning
spec:
  replicas: 2
  selector:
    matchLabels:
      app: api-gateway
  template:
    metadata:
      labels:
        app: api-gateway
    spec:
      containers:
      - name: api-gateway
        image: ai-reasoning-gateway:latest
        imagePullPolicy: Never
        ports:
        - containerPort: 8080
        env:
        - name: CORE_ENGINE_URL
          value: "http://core-engine-svc:8000"
        - name: ENFORCE_AIC_CONTRACTS
          value: "True"
        resources:
          requests:
            memory: "512Mi"
            cpu: "250m"
