apiVersion: v1
kind: ConfigMap
metadata:
  name: prometheus-config
  namespace: ai-reasoning
data:
  prometheus.yml: |
    global:
      scrape_interval: 10s
    scrape_configs:
      - job_name: 'ai-reasoning-core'
        kubernetes_sd_configs:
          - role: pod
        relabel_configs:
          - source_labels: [__meta_kubernetes_pod_label_app]
            action: keep
            regex: core-engine
          - source_labels: [__meta_kubernetes_pod_container_port_number]
            action: keep
            regex: 8000
